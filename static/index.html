<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent Task Solver</title>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface-2: #242836;
      --accent:    #6366f1;
      --accent-dk: #4f46e5;
      --success:   #22c55e;
      --error:     #ef4444;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --border:    #2d3347;
      --radius:    8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 820px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; }
    header p  { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 1rem;
    }

    /* ── Form controls ── */
    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea { resize: vertical; min-height: 110px; }
    textarea:focus, input[type="text"]:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent-dk); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-ghost { background: var(--surface-2); color: var(--text); }
    .btn-ghost:hover:not(:disabled) { background: var(--border); }

    .btn-row { display: flex; justify-content: flex-end; margin-top: 0.75rem; gap: 0.5rem; }

    /* ── Visibility ── */
    .hidden { display: none !important; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.6rem;
      border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-pending  { background: #2d3347; color: var(--muted); }
    .badge-running  { background: #1e3a5f; color: #60a5fa; }
    .badge-done     { background: #14352a; color: var(--success); }
    .badge-failed   { background: #3b1f1f; color: var(--error); }
    .badge-skipped  { background: #2d3347; color: var(--muted); }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 9px; height: 9px;
      border: 2px solid #60a5fa33; border-top-color: #60a5fa;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    /* ── Thinking spinner (larger, used while planning) ── */
    .thinking-spinner {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid #6366f133; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    .thinking-row {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .thinking-label {
      color: var(--muted); font-size: 0.9rem;
    }

    /* ── Subtask list ── */
    .subtask {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .subtask:last-child { border-bottom: none; }
    .subtask-icon { font-size: 1.25rem; min-width: 1.5rem; text-align: center; line-height: 1; padding-top: 2px; }
    .subtask-body { flex: 1; min-width: 0; }
    .subtask-desc { font-size: 0.9rem; line-height: 1.4; }
    .subtask-agent { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
    .subtask-status { margin-top: 0.4rem; }
    .subtask-detail {
      font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem;
      line-height: 1.5; word-break: break-word;
    }

    /* ── Clarification ── */
    .question-row { margin-bottom: 0.85rem; }
    .question-label { display: block; font-size: 0.9rem; margin-bottom: 0.35rem; }

    /* ── Result ── */
    .answer {
      font-size: 0.95rem; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .artifacts { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.25rem; }
    .artifact img {
      max-width: 100%; border-radius: var(--radius);
      border: 1px solid var(--border); display: block;
    }
    .artifact-caption { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; }
    .warnings {
      margin-top: 1rem; padding: 0.75rem 1rem;
      background: #2a1a1a; border-radius: var(--radius);
      border-left: 3px solid var(--error);
    }
    .warnings p  { font-size: 0.85rem; color: #fca5a5; font-weight: 600; }
    .warnings ul { margin-top: 0.4rem; padding-left: 1.25rem; }
    .warnings li { font-size: 0.85rem; color: #fca5a5; }

    /* ── Error banner ── */
    .error-banner {
      padding: 0.75rem 1rem; background: #2a1a1a;
      border-radius: var(--radius); border-left: 3px solid var(--error);
      color: #fca5a5; font-size: 0.9rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <h1>Multi-Agent Task Solver</h1>
    <p>Submit a business request and watch multiple AI agents collaborate to answer it.</p>
  </header>

  <!-- Request form -->
  <div class="card" id="form-card">
    <h2>Your Request</h2>
    <textarea
      id="request-input"
      placeholder="e.g. Summarize recent AI safety research and create a timeline chart of key milestones"
    ></textarea>
    <div class="btn-row">
      <button id="submit-btn" onclick="submitRequest()">Solve →</button>
    </div>
    <p style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;text-align:right">
      Ctrl+Enter / ⌘+Enter to submit
    </p>
  </div>

  <!-- Error banner -->
  <div class="error-banner hidden" id="error-banner"></div>

  <!-- Thinking / planning spinner -->
  <div class="card hidden" id="thinking-card">
    <div class="thinking-row">
      <div class="thinking-spinner"></div>
      <span class="thinking-label" id="thinking-label">Planning your request…</span>
    </div>
  </div>

  <!-- Clarification -->
  <div class="card hidden" id="clarification-card">
    <h2>Clarification Needed</h2>
    <p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem">
      Please answer the following before the agents proceed.
    </p>
    <div id="clarification-questions"></div>
    <div class="btn-row">
      <button onclick="submitClarification()">Submit Answers →</button>
    </div>
  </div>

  <!-- Agent progress -->
  <div class="card hidden" id="plan-card">
    <h2>Agent Progress</h2>
    <div id="subtask-list"></div>
  </div>

  <!-- Final result -->
  <div class="card hidden" id="result-card">
    <h2>Result</h2>
    <div class="answer" id="result-answer"></div>
    <div class="artifacts" id="result-artifacts"></div>
    <div class="hidden" id="result-warnings"></div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn-ghost" onclick="resetUI()">New Request</button>
    </div>
  </div>

</div>

<script>
  'use strict';

  const ICONS = { research: '🔍', code: '💻', summary: '📝', aggregator: '📊' };

  let taskId = null;
  let es = null;

  // ── Submit request ──────────────────────────────────────────────────

  async function submitRequest() {
    const request = document.getElementById('request-input').value.trim();
    if (!request) return;

    lockForm();
    hideEl('error-banner');

    let data;
    try {
      const res = await fetch('/task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request }),
      });
      if (!res.ok) throw new Error('Server returned ' + res.status);
      data = await res.json();
    } catch (err) {
      showError(err.message);
      unlockForm();
      return;
    }

    taskId = data.task_id;
    showEl('thinking-card');
    openStream();
  }

  // ── SSE stream ──────────────────────────────────────────────────────

  function openStream() {
    es = new EventSource('/task/' + taskId + '/stream');

    es.addEventListener('clarification_needed', (e) => {
      const { questions } = parseData(e);
      document.getElementById('thinking-label').textContent = 'Waiting for your answers…';
      showClarification(questions);
    });

    es.addEventListener('plan_ready', (e) => {
      hideEl('thinking-card');
      const { subtasks } = parseData(e);
      renderPlan(subtasks);
    });

    es.addEventListener('agent_started', (e) => {
      const { subtask_id } = parseData(e);
      setStatus(subtask_id, 'running');
    });

    es.addEventListener('agent_completed', (e) => {
      const { subtask_id, summary } = parseData(e);
      setStatus(subtask_id, 'done', summary);
    });

    es.addEventListener('agent_failed', (e) => {
      const { subtask_id, error } = parseData(e);
      setStatus(subtask_id, 'failed', error);
    });

    es.addEventListener('result_ready', (e) => {
      const { result } = parseData(e);
      renderResult(result);
      es.close();
    });

    es.addEventListener('error', (e) => {
      hideEl('thinking-card');
      try {
        const { message } = parseData(e);
        showError(message || 'An error occurred.');
      } catch {
        showError('An unexpected server error occurred.');
      }
      es.close();
    });

    es.onerror = () => {
      // Stream closed — only flag an error if we haven't shown a result yet
      if (!document.getElementById('result-card').classList.contains('hidden')) return;
      es.close();
    };
  }

  function parseData(e) {
    return JSON.parse(e.data).data;
  }

  // ── Clarification ───────────────────────────────────────────────────

  function showClarification(questions) {
    const container = document.getElementById('clarification-questions');
    container.innerHTML = '';
    questions.forEach((q, i) => {
      const row = document.createElement('div');
      row.className = 'question-row';
      row.innerHTML =
        '<label class="question-label" for="cq' + i + '">' +
          (i + 1) + '. ' + esc(q) +
        '</label>' +
        '<input type="text" id="cq' + i + '" placeholder="Your answer…" />';
      container.appendChild(row);
    });
    showEl('clarification-card');
  }

  async function submitClarification() {
    const inputs = document.querySelectorAll('#clarification-questions input');
    const answers = Array.from(inputs).map((el) => el.value.trim());
    try {
      await fetch('/task/' + taskId + '/clarify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers }),
      });
    } catch (err) {
      showError('Failed to submit answers: ' + err.message);
      return;
    }
    hideEl('clarification-card');
  }

  // ── Plan / subtask cards ────────────────────────────────────────────

  function renderPlan(subtasks) {
    const list = document.getElementById('subtask-list');
    list.innerHTML = '';
    subtasks.forEach((s) => {
      const el = document.createElement('div');
      el.className = 'subtask';
      el.id = 'subtask-' + s.id;
      el.innerHTML =
        '<div class="subtask-icon">' + (ICONS[s.agent] || '🤖') + '</div>' +
        '<div class="subtask-body">' +
          '<div class="subtask-desc">' + esc(s.description) + '</div>' +
          '<div class="subtask-agent">' + esc(s.agent) + '</div>' +
          '<div class="subtask-status" id="st-' + s.id + '">' +
            '<span class="badge badge-pending">Pending</span>' +
          '</div>' +
          '<div class="subtask-detail hidden" id="sd-' + s.id + '"></div>' +
        '</div>';
      list.appendChild(el);
    });
    showEl('plan-card');
  }

  function setStatus(id, state, detail) {
    const stEl = document.getElementById('st-' + id);
    const sdEl = document.getElementById('sd-' + id);
    if (!stEl) return;

    const badges = {
      running: '<span class="badge badge-running"><span class="spinner"></span> Running</span>',
      done:    '<span class="badge badge-done">✓ Done</span>',
      failed:  '<span class="badge badge-failed">✗ Failed</span>',
      skipped: '<span class="badge badge-skipped">— Skipped</span>',
    };
    stEl.innerHTML = badges[state] || '';

    if (detail && sdEl) {
      sdEl.textContent = detail;
      sdEl.classList.remove('hidden');
    }
  }

  // ── Final result ────────────────────────────────────────────────────

  function renderResult(result) {
    document.getElementById('result-answer').textContent = result.answer || '';

    const artEl = document.getElementById('result-artifacts');
    artEl.innerHTML = '';
    (result.artifacts || []).forEach((a) => {
      const div = document.createElement('div');
      div.className = 'artifact';
      div.innerHTML =
        '<img src="' + esc(a.url) + '" alt="' + esc(a.caption || 'Chart') + '" />' +
        (a.caption ? '<div class="artifact-caption">' + esc(a.caption) + '</div>' : '');
      artEl.appendChild(div);
    });

    const warnings = result.warnings || [];
    const warnEl = document.getElementById('result-warnings');
    if (warnings.length > 0) {
      warnEl.innerHTML =
        '<div class="warnings"><p>Issues encountered:</p><ul>' +
        warnings.map((w) => '<li>' + esc(w) + '</li>').join('') +
        '</ul></div>';
      warnEl.classList.remove('hidden');
    }

    showEl('result-card');
  }

  // ── UI helpers ──────────────────────────────────────────────────────

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = '⚠ ' + msg;
    el.classList.remove('hidden');
    unlockForm();
  }

  function lockForm() {
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('request-input').disabled = true;
  }

  function unlockForm() {
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('request-input').disabled = false;
  }

  function showEl(id) { document.getElementById(id).classList.remove('hidden'); }
  function hideEl(id) { document.getElementById(id).classList.add('hidden'); }

  function resetUI() {
    if (es) { es.close(); es = null; }
    taskId = null;
    document.getElementById('request-input').value = '';
    ['thinking-card', 'clarification-card', 'plan-card', 'result-card', 'error-banner'].forEach(hideEl);
    document.getElementById('thinking-label').textContent = 'Planning your request…';
    document.getElementById('subtask-list').innerHTML = '';
    document.getElementById('result-artifacts').innerHTML = '';
    document.getElementById('result-warnings').classList.add('hidden');
    unlockForm();
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Ctrl+Enter / Cmd+Enter to submit
  document.getElementById('request-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitRequest();
  });
</script>
</body>
</html>
