<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent Task Solver</title>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface-2: #242836;
      --accent:    #6366f1;
      --accent-dk: #4f46e5;
      --success:   #22c55e;
      --error:     #ef4444;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --border:    #2d3347;
      --radius:    8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 820px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; }
    header p  { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 1rem;
    }

    /* ── Form controls ── */
    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea { resize: vertical; min-height: 110px; }
    textarea:focus, input[type="text"]:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent-dk); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-row { display: flex; justify-content: flex-end; margin-top: 0.75rem; gap: 0.5rem; }

    /* ── Visibility ── */
    .hidden { display: none !important; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.6rem;
      border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-pending  { background: #2d3347; color: var(--muted); }
    .badge-running  { background: #1e3a5f; color: #60a5fa; }
    .badge-done     { background: #14352a; color: var(--success); }
    .badge-failed   { background: #3b1f1f; color: var(--error); }
    .badge-skipped  { background: #2d3347; color: var(--muted); }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 9px; height: 9px;
      border: 2px solid #60a5fa33; border-top-color: #60a5fa;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    /* ── Thinking spinner ── */
    .thinking-spinner {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid #6366f133; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    .thinking-row { display: flex; align-items: center; gap: 0.75rem; }
    .thinking-label { color: var(--muted); font-size: 0.9rem; }

    /* ── Subtask list ── */
    .subtask {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    .subtask:last-child { border-bottom: none; }
    .subtask-icon { font-size: 1.25rem; min-width: 1.5rem; text-align: center; line-height: 1; padding-top: 2px; }
    .subtask-body { flex: 1; min-width: 0; }
    .subtask-desc { font-size: 0.9rem; line-height: 1.4; }
    .subtask-agent { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
    .subtask-status { margin-top: 0.4rem; }
    .subtask-detail {
      font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem;
      line-height: 1.5; word-break: break-word;
    }

    /* ── Clarification ── */
    .question-row { margin-bottom: 0.85rem; }
    .question-label { display: block; font-size: 0.9rem; margin-bottom: 0.35rem; }

    /* ── Result ── */
    .answer {
      font-size: 0.95rem; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .artifacts { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.25rem; }
    .artifact img {
      max-width: 100%; border-radius: var(--radius);
      border: 1px solid var(--border); display: block;
    }
    .artifact-caption { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; }
    .warnings {
      margin-top: 1rem; padding: 0.75rem 1rem;
      background: #2a1a1a; border-radius: var(--radius);
      border-left: 3px solid var(--error);
    }
    .warnings p  { font-size: 0.85rem; color: #fca5a5; font-weight: 600; }
    .warnings ul { margin-top: 0.4rem; padding-left: 1.25rem; }
    .warnings li { font-size: 0.85rem; color: #fca5a5; }

    /* ── Error card ── */
    .error-card {
      padding: 0.75rem 1rem; background: #2a1a1a;
      border-radius: var(--radius); border-left: 3px solid var(--error);
      color: #fca5a5; font-size: 0.9rem; margin-bottom: 1rem;
    }

    /* ── Conversation ── */
    .session-separator {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.5rem 0 1rem; color: var(--muted); font-size: 0.72rem;
      font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .session-separator::before, .session-separator::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Submitted request displayed inline */
    .query-card {
      border-left: 3px solid var(--accent);
      font-size: 0.95rem; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text);
    }

    /* Input card hint text */
    .input-hint {
      font-size: 0.78rem; color: var(--muted);
      margin-top: 0.5rem; text-align: right;
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <h1>Multi-Agent Task Solver</h1>
    <p>Submit a business request and watch multiple AI agents collaborate to answer it.</p>
  </header>

  <div id="conversation"></div>

</div>

<script>
  'use strict';

  const ICONS = { research: '🔍', code: '💻', summary: '📝', aggregator: '📊' };
  let sessionCount = 0;

  // ── Input card ───────────────────────────────────────────────────────
  // A fresh input card is appended at the bottom on load and after each result.

  function appendInputCard() {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<h2>Your Request</h2>' +
      '<textarea placeholder="e.g. Summarize recent AI safety research and create a timeline chart of key milestones"></textarea>' +
      '<div class="btn-row"><button>Solve →</button></div>' +
      '<p class="input-hint">Ctrl+Enter / ⌘+Enter to submit</p>';

    const textarea = card.querySelector('textarea');
    const btn      = card.querySelector('button');

    const submit = () => submitRequest(card, textarea, btn);
    btn.onclick = submit;
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submit();
    });

    document.getElementById('conversation').appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'end' });
    // Small delay so the scroll finishes before focus opens the keyboard on mobile
    setTimeout(() => textarea.focus(), 300);
  }

  // ── Submit ───────────────────────────────────────────────────────────

  async function submitRequest(inputCard, textarea, btn) {
    const request = textarea.value.trim();
    if (!request) return;

    btn.disabled    = true;
    textarea.disabled = true;

    let data;
    try {
      const res = await fetch('/task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request }),
      });
      if (!res.ok) throw new Error('Server returned ' + res.status);
      data = await res.json();
    } catch (err) {
      // Re-enable so the user can try again in the same card
      btn.disabled    = false;
      textarea.disabled = false;
      showErrorCard(err.message);
      return;
    }

    sessionCount++;

    // Separate from previous session
    if (sessionCount > 1) {
      const sep = document.createElement('div');
      sep.className = 'session-separator';
      inputCard.before(sep);
    }

    // Transform the input card into a read-only query display
    inputCard.className = 'card query-card';
    inputCard.textContent = request;

    // Build session cards below and start streaming
    const session = buildSession(data.task_id);
    show(session.thinkingCard);
    openStream(session);
  }

  // ── Session builder ──────────────────────────────────────────────────
  // Appends the progress/result cards to #conversation and returns refs.

  function buildSession(taskId) {
    const session = { taskId, es: null };
    const thread  = document.getElementById('conversation');

    function addCard(html) {
      const card = document.createElement('div');
      card.className = 'card hidden';
      card.innerHTML = html;
      thread.appendChild(card);
      return card;
    }

    // Thinking
    session.thinkingCard = addCard(
      '<div class="thinking-row">' +
        '<div class="thinking-spinner"></div>' +
        '<span class="thinking-label">Planning your request…</span>' +
      '</div>'
    );
    session.thinkingLabel = session.thinkingCard.querySelector('.thinking-label');

    // Clarification
    session.clarificationCard = addCard(
      '<h2>Clarification Needed</h2>' +
      '<p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem">' +
        'Please answer the following before the agents proceed.' +
      '</p>' +
      '<div class="clarification-questions"></div>' +
      '<div class="btn-row"><button>Submit Answers →</button></div>'
    );
    session.clarificationQuestions = session.clarificationCard.querySelector('.clarification-questions');
    session.clarificationCard.querySelector('button').onclick = () => submitClarification(session);

    // Plan
    session.planCard = addCard('<h2>Agent Progress</h2><div class="subtask-list"></div>');
    session.subtaskList = session.planCard.querySelector('.subtask-list');

    // Result
    session.resultCard = addCard(
      '<h2>Result</h2>' +
      '<div class="answer"></div>' +
      '<div class="artifacts"></div>' +
      '<div class="result-warnings hidden"></div>'
    );
    session.resultAnswer    = session.resultCard.querySelector('.answer');
    session.resultArtifacts = session.resultCard.querySelector('.artifacts');
    session.resultWarnings  = session.resultCard.querySelector('.result-warnings');

    return session;
  }

  // ── SSE stream ───────────────────────────────────────────────────────

  function openStream(session) {
    const es = new EventSource('/task/' + session.taskId + '/stream');
    session.es = es;

    es.addEventListener('clarification_needed', (e) => {
      const { questions } = parseData(e);
      session.thinkingLabel.textContent = 'Waiting for your answers…';
      showClarification(session, questions);
    });

    es.addEventListener('plan_ready', (e) => {
      hide(session.thinkingCard);
      renderPlan(session, parseData(e).subtasks);
    });

    es.addEventListener('agent_started', (e) => {
      setStatus(session, parseData(e).subtask_id, 'running');
    });

    es.addEventListener('agent_completed', (e) => {
      const { subtask_id, summary } = parseData(e);
      setStatus(session, subtask_id, 'done', summary);
    });

    es.addEventListener('agent_failed', (e) => {
      const { subtask_id, error } = parseData(e);
      setStatus(session, subtask_id, 'failed', error);
    });

    es.addEventListener('result_ready', (e) => {
      renderResult(session, parseData(e).result);
      es.close();
      appendInputCard();
    });

    es.addEventListener('error', (e) => {
      hide(session.thinkingCard);
      try {
        const { message } = parseData(e);
        showErrorCard(message || 'An error occurred.');
      } catch {
        showErrorCard('An unexpected server error occurred.');
      }
      es.close();
      appendInputCard();
    });

    es.onerror = () => {
      // Fires on normal close too — only surface an error if we have no result
      if (!session.resultCard.classList.contains('hidden')) return;
      es.close();
      appendInputCard();
    };
  }

  function parseData(e) { return JSON.parse(e.data).data; }

  // ── Clarification ────────────────────────────────────────────────────

  function showClarification(session, questions) {
    session.clarificationQuestions.innerHTML = '';
    questions.forEach((q, i) => {
      const row = document.createElement('div');
      row.className = 'question-row';
      row.innerHTML =
        '<label class="question-label" for="cq-' + session.taskId + '-' + i + '">' +
          (i + 1) + '. ' + esc(q) +
        '</label>' +
        '<input type="text" id="cq-' + session.taskId + '-' + i + '" placeholder="Your answer…" />';
      session.clarificationQuestions.appendChild(row);
    });
    show(session.clarificationCard);
  }

  async function submitClarification(session) {
    const inputs  = session.clarificationCard.querySelectorAll('input[type="text"]');
    const answers = Array.from(inputs).map((el) => el.value.trim());
    try {
      await fetch('/task/' + session.taskId + '/clarify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers }),
      });
    } catch (err) {
      showErrorCard('Failed to submit answers: ' + err.message);
      return;
    }
    hide(session.clarificationCard);
  }

  // ── Plan ─────────────────────────────────────────────────────────────

  function renderPlan(session, subtasks) {
    session.subtaskList.innerHTML = '';
    subtasks.forEach((s) => {
      const el = document.createElement('div');
      el.className = 'subtask';
      el.dataset.id = s.id;
      el.innerHTML =
        '<div class="subtask-icon">' + (ICONS[s.agent] || '🤖') + '</div>' +
        '<div class="subtask-body">' +
          '<div class="subtask-desc">' + esc(s.description) + '</div>' +
          '<div class="subtask-agent">' + esc(s.agent) + '</div>' +
          '<div class="subtask-status"><span class="badge badge-pending">Pending</span></div>' +
          '<div class="subtask-detail hidden"></div>' +
        '</div>';
      session.subtaskList.appendChild(el);
    });
    show(session.planCard);
  }

  function setStatus(session, id, state, detail) {
    const row = session.subtaskList.querySelector('[data-id="' + id + '"]');
    if (!row) return;
    const badges = {
      running: '<span class="badge badge-running"><span class="spinner"></span> Running</span>',
      done:    '<span class="badge badge-done">✓ Done</span>',
      failed:  '<span class="badge badge-failed">✗ Failed</span>',
      skipped: '<span class="badge badge-skipped">— Skipped</span>',
    };
    row.querySelector('.subtask-status').innerHTML = badges[state] || '';
    if (detail) {
      const sd = row.querySelector('.subtask-detail');
      sd.textContent = detail;
      sd.classList.remove('hidden');
    }
  }

  // ── Result ───────────────────────────────────────────────────────────

  function renderResult(session, result) {
    session.resultAnswer.textContent = result.answer || '';

    session.resultArtifacts.innerHTML = '';
    (result.artifacts || []).forEach((a) => {
      const div = document.createElement('div');
      div.className = 'artifact';
      div.innerHTML =
        '<img src="' + esc(a.url) + '" alt="' + esc(a.caption || 'Chart') + '" />' +
        (a.caption ? '<div class="artifact-caption">' + esc(a.caption) + '</div>' : '');
      session.resultArtifacts.appendChild(div);
    });

    const warnings = result.warnings || [];
    if (warnings.length > 0) {
      session.resultWarnings.innerHTML =
        '<div class="warnings"><p>Issues encountered:</p><ul>' +
        warnings.map((w) => '<li>' + esc(w) + '</li>').join('') +
        '</ul></div>';
      session.resultWarnings.classList.remove('hidden');
    }

    show(session.resultCard);
    session.resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Helpers ──────────────────────────────────────────────────────────

  function show(el) { el.classList.remove('hidden'); }
  function hide(el) { el.classList.add('hidden'); }

  function showErrorCard(msg) {
    const el = document.createElement('div');
    el.className = 'error-card';
    el.textContent = '⚠ ' + msg;
    document.getElementById('conversation').appendChild(el);
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Boot ─────────────────────────────────────────────────────────────
  appendInputCard();
</script>
</body>
</html>
